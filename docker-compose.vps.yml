services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradingplatformcodex}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-tradingplatformcodex}
      REDIS_URL: redis://redis:6379
    labels:
      - traefik.enable=true
      - traefik.http.routers.tradeplatformcodex.rule=Host(`${TRAEFIK_HOST:-tradingplatformcodex.mpsecurity.cloud}`)
      - traefik.http.routers.tradeplatformcodex.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.tradeplatformcodex.tls=true
      - traefik.http.routers.tradeplatformcodex.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.tradeplatformcodex.loadbalancer.server.port=3000
    depends_on:
      - db
      - redis
    networks:
      - default
      - traefik

  # Scalp strategy: fast EMA pair, short entry timeframes, stricter ADX gate.
  worker-scalp:
    build: .
    restart: unless-stopped
    command: ["npm", "run", "start", "--workspace", "@tradeplatformcodex/worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradingplatformcodex}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-tradingplatformcodex}
      REDIS_URL: redis://redis:6379
      APP_NAME: Scalp
      TIMEFRAMES: 5m,15m,1h,4h
      ENTRY_TIMEFRAMES: 5m,15m
      CONTEXT_TIMEFRAMES: 1h,4h
      EMA_FAST: "8"
      EMA_SLOW: "50"
      ADX_TREND_THRESHOLD: "30"
      # Regime read fast, with looser cutoffs so quick bars aren't all VOLATILE.
      MARKOV_CONTEXT_TIMEFRAMES: 15m,1h
      MARKOV_VOLATILE_THRESHOLD: "0.012"
      MARKOV_SIDEWAYS_THRESHOLD: "0.0009"
      # Scalp shouldn't chase: tighter overextension cutoff.
      EXTENSION_ATR_MULT: "2"
    depends_on:
      - db
      - redis

  # Swing strategy: slow macro EMA pair, higher entry timeframes, looser ADX gate.
  worker-swing:
    build: .
    restart: unless-stopped
    command: ["npm", "run", "start", "--workspace", "@tradeplatformcodex/worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradingplatformcodex}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-tradingplatformcodex}
      REDIS_URL: redis://redis:6379
      APP_NAME: Swing
      TIMEFRAMES: 1h,4h,1d
      ENTRY_TIMEFRAMES: 1h,4h
      CONTEXT_TIMEFRAMES: 1h,4h,1d
      EMA_FAST: "50"
      EMA_SLOW: "200"
      ADX_TREND_THRESHOLD: "20"
      # Regime read slow off the higher timeframes, with tighter cutoffs.
      MARKOV_CONTEXT_TIMEFRAMES: 4h,1d
      MARKOV_VOLATILE_THRESHOLD: "0.006"
      MARKOV_SIDEWAYS_THRESHOLD: "0.0004"
      # Swing can ride further from the mean before it's "extended".
      EXTENSION_ATR_MULT: "3"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradingplatformcodex}
      POSTGRES_USER: ${POSTGRES_USER:-tradingplatformcodex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingplatformcodex -d tradingplatformcodex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
